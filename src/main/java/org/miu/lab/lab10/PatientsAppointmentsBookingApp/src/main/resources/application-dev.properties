# ─── PAMS — Development Profile ───────────────────────────────────────────────
# Active when: --spring.profiles.active=dev
#
# In development we want:
#   • Verbose logging (DEBUG level for app code)
#   • Detailed startup info
#   • Banner visible for quick visual feedback

spring.application.name=PatientsAppointmentsBookingApp [DEV]

# Logging
logging.level.com.example.pams=DEBUG
logging.level.org.springframework=INFO
logging.pattern.console=%d{HH:mm:ss} [%p] %logger{36} - %msg%n

# Spring Boot actuator / info (handy during dev)
management.endpoint.info.enabled=true

# Show a profile label in banner area
spring.main.banner-mode=console
