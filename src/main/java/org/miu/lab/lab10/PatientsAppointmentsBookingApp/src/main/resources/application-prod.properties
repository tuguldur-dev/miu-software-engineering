# ─── PAMS — Production Profile ────────────────────────────────────────────────
# Active when: --spring.profiles.active=prod
#
# In production we want:
#   • WARN-level logging only (reduce noise / storage cost)
#   • No Spring Boot banner
#   • No debug output

spring.application.name=PatientsAppointmentsBookingApp

# Logging — only warnings and errors in production
logging.level.com.example.pams=WARN
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%p] %logger{50} - %msg%n

# Suppress banner in production
spring.main.banner-mode=off
